<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="icon" type="image/png" sizes="64x64" href="/favicon-cmp.png">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<meta name="apple-mobile-web-app-title" content="CMPGestão">
<meta name="robots" content="noindex">
<title>Convite de acesso — CMPGestão</title>
<style>
  :root{--navy:#2E3A4B;--gold:#C9A227;--muted:#697180;--line:#e4e8ef}
  *{box-sizing:border-box}
  body{margin:0;font-family:'Segoe UI',system-ui,-apple-system,Arial,sans-serif;background:#f2f4f8;color:#1e2733;display:flex;min-height:100vh;align-items:center;justify-content:center;padding:18px}
  .card{background:#fff;border-radius:16px;box-shadow:0 10px 34px rgba(20,28,40,.12);max-width:430px;width:100%;padding:26px 24px}
  h1{font-size:19px;margin:0 0 4px;color:var(--navy)}
  .sub{font-size:13px;color:var(--muted);margin:0 0 18px}
  label{display:block;font-size:12.5px;font-weight:700;color:#3a4353;margin:12px 0 4px}
  input{width:100%;padding:11px 12px;border:1px solid var(--line);border-radius:9px;font-size:15px}
  button{width:100%;margin-top:18px;padding:13px;border:none;border-radius:10px;background:var(--navy);color:#fff;font-size:15px;font-weight:700;cursor:pointer}
  button:disabled{opacity:.6}
  .erro{background:#fbeceb;color:#b5342b;border-radius:9px;padding:10px 12px;font-size:13px;margin-top:12px;display:none}
  .ok{ text-align:center }
  .ok .big{font-size:44px}
  .brand{font-size:11px;color:var(--muted);text-align:center;margin-top:16px}
  a.btn{display:inline-block;margin-top:14px;padding:12px 22px;background:var(--gold);color:#fff;border-radius:10px;text-decoration:none;font-weight:700}
</style>
</head>
<body>
<div class="card" id="box">
  <h1>Bem-vindo(a) ao CMPGestão</h1>
  <p class="sub">Crispim, Mendonça e Pinheiro Advogados — crie seu acesso em 30 segundos.</p>
  <div id="form" style="display:none">
    <label>Seu nome (como vai aparecer no sistema — pode editar)</label>
    <input id="nome" placeholder="Nome completo">
    <label>Seu e-mail (vai ser seu login)</label>
    <input id="email" type="email" placeholder="voce@email.com" autocomplete="email">
    <label>Crie uma senha (mínimo 6 caracteres)</label>
    <input id="senha" type="password" autocomplete="new-password">
    <label>Repita a senha</label>
    <input id="senha2" type="password" autocomplete="new-password">
    <button id="btn" onclick="criar()">Criar meu acesso</button>
  </div>
  <div id="msg" class="erro"></div>
  <div id="done" class="ok" style="display:none">
    <div class="big">🎉</div>
    <h1>Acesso criado!</h1>
    <p class="sub">Use seu e-mail e a senha que você criou para entrar.</p>
    <a class="btn" href="/">Entrar no CMPGestão</a>
  </div>
  <div class="brand">CMPGestão · acesso restrito à equipe</div>
</div>
<script>
var T=new URLSearchParams(location.search).get('t')||'';
function erro(m){ var e=document.getElementById('msg'); e.textContent=m; e.style.display='block'; }
function limpaErro(){ var e=document.getElementById('msg'); e.style.display='none'; }
(async function(){
  if(!T){ erro('Link incompleto — peça o link de convite novamente.'); return; }
  try{
    var r=await fetch('/api/convite?t='+encodeURIComponent(T));
    var j=await r.json().catch(function(){return {};});
    if(!r.ok){ erro(j.erro||('Convite inválido (HTTP '+r.status+').')); return; }
    if(j.usado){ document.getElementById('done').style.display='block'; document.querySelector('.sub').textContent='Este convite já foi usado — entre com seu e-mail e senha.'; return; }
    document.getElementById('form').style.display='block';
    document.getElementById('nome').value=j.nome_sugerido||'';
  }catch(e){ erro('Não foi possível validar o convite: '+(e&&e.message||e)); }
})();
async function criar(){
  limpaErro();
  var nome=(document.getElementById('nome').value||'').trim();
  var email=(document.getElementById('email').value||'').trim();
  var s1=document.getElementById('senha').value, s2=document.getElementById('senha2').value;
  if(nome.length<3){ erro('Informe seu nome completo.'); return; }
  if(!/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(email)){ erro('Informe um e-mail válido — ele será seu login.'); return; }
  if(s1.length<6){ erro('A senha precisa de pelo menos 6 caracteres.'); return; }
  if(s1!==s2){ erro('As senhas não conferem.'); return; }
  var b=document.getElementById('btn'); b.disabled=true; b.textContent='Criando…';
  try{
    var r=await fetch('/api/convite',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({acao:'aceitar',token:T,nome:nome,email:email,senha:s1})});
    var j=await r.json().catch(function(){return {};});
    if(!r.ok){ erro(j.erro||('Não foi possível criar (HTTP '+r.status+').')); b.disabled=false; b.textContent='Criar meu acesso'; return; }
    document.getElementById('form').style.display='none';
    document.getElementById('done').style.display='block';
  }catch(e){ erro('Erro: '+(e&&e.message||e)); b.disabled=false; b.textContent='Criar meu acesso'; }
}
</script>
</body>
</html>
